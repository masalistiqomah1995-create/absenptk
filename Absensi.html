<!DOCTYPE html>
<html>
<head>
<base target="_top">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#F8FAFC;
    font-family:'Segoe UI',sans-serif;
}

.card-modern{
    border:none;
    border-radius:20px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.hero{
    background:linear-gradient(135deg,#2563EB,#1E40AF);
    color:white;
    border-radius:20px;
    padding:30px;
}

.btn-masuk{
    background:#22C55E;
    border:none;
    height:55px;
    font-weight:600;
}

.btn-pulang{
    background:#EF4444;
    border:none;
    height:55px;
    font-weight:600;
}

.status-box{
    padding:15px;
    border-radius:15px;
    background:#EFF6FF;
    border-left:5px solid #2563EB;
}

.table thead{
    background:#2563EB;
    color:white;
}

.badge-hadir{
    background:#22C55E;
}

.badge-terlambat{
    background:#F59E0B;
}

.loading{
    display:none;
}

</style>

</head>

<body>

<div class="container-fluid p-4">

<div class="hero mb-4">

<h3 id="namaGuru">
Selamat Datang Guru
</h3>

<p class="mb-0">
Sistem Absensi Guru Digital
</p>

</div>

<div class="row">

<div class="col-lg-4">

<div class="card card-modern mb-4">

<div class="card-body">

<h5 class="mb-3">
Status Hari Ini
</h5>

<div class="status-box">

<div id="statusHariIni">
Belum Absen
</div>

</div>

</div>

</div>

<div class="card card-modern">

<div class="card-body">

<h5 class="mb-3">
Absensi Guru
</h5>

<div class="d-grid gap-3">

<button
class="btn btn-success btn-masuk"
onclick="absenMasuk()">

<i class="fa fa-right-to-bracket"></i>
Absen Masuk

</button>

<button
class="btn btn-danger btn-pulang"
onclick="absenPulang()">

<i class="fa fa-right-from-bracket"></i>
Absen Pulang

</button>

</div>

<div class="text-center mt-3">

<div
id="loading"
class="spinner-border text-primary loading">
</div>

</div>

</div>

</div>

</div>

<div class="col-lg-8">

<div class="card card-modern">

<div class="card-body">

<h5 class="mb-3">
Riwayat Absensi
</h5>

<div class="table-responsive">

<table class="table table-bordered">

<thead>

<tr>

<th>Tanggal</th>
<th>Masuk</th>
<th>Status</th>
<th>Pulang</th>

</tr>

</thead>

<tbody id="riwayat">

<tr>

<td colspan="4" class="text-center">

Memuat Data...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

let user =
JSON.parse(
sessionStorage.getItem("user")
);

document
.getElementById("namaGuru")
.innerHTML =
"Selamat Datang, " + user.nama;

loadRiwayat();

function showLoading(status){

document
.getElementById("loading")
.style.display =
status ? "inline-block" : "none";

}

function absenMasuk(){

showLoading(true);

google.script.run

.withSuccessHandler(function(res){

showLoading(false);

if(res.success){

alert(
"Absen Masuk Berhasil\nJam : " +
res.jam +
"\nStatus : " +
res.status
);

document
.getElementById("statusHariIni")
.innerHTML =
res.status;

loadRiwayat();

}else{

alert(
res.message
);

}

})

.absenMasuk(
user.nama
);

}

function absenPulang(){

showLoading(true);

google.script.run

.withSuccessHandler(function(res){

showLoading(false);

if(res.success){

alert(
"Absensi Pulang Berhasil\nJam : " +
res.jam
);

loadRiwayat();

}else{

alert(
res.message
);

}

})

.absenPulang(
user.nama
);

}

function loadRiwayat(){

google.script.run

.withSuccessHandler(function(data){

let html='';

let jumlah=0;

for(let i=1;i<data.length;i++){

if(data[i][2]===user.nama){

jumlah++;

html += `
<tr>

<td>${data[i][1]}</td>

<td>${data[i][3]}</td>

<td>

<span class="badge bg-${
data[i][4]=='Tepat Waktu'
?
'success'
:
'warning'
}">

${data[i][4]}

</span>

</td>

<td>${data[i][5]}</td>

</tr>
`;

}

}

if(jumlah===0){

html=`
<tr>

<td colspan="4" class="text-center">

Belum Ada Data Absensi

</td>

</tr>
`;

}

document
.getElementById("riwayat")
.innerHTML =
html;

})

.getAbsensi();

}

</script>

</body>
</html>
