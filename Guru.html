<!DOCTYPE html>
<html>
<head>
<base target="_top">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#F8FAFC;
    font-family:'Segoe UI',sans-serif;
}

.page-title{
    font-size:28px;
    font-weight:700;
}

.card-custom{
    border:none;
    border-radius:20px;
    background:#fff;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.btn-primary{
    background:#2563EB;
    border:none;
}

.table thead{
    background:#2563EB;
    color:#fff;
}

.pagination .page-link{
    color:#2563EB;
}

.modal-content{
    border-radius:20px;
    border:none;
}

</style>

</head>

<body>

<div class="container-fluid p-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h3 class="page-title">
Data Guru
</h3>

<small class="text-muted">
Manajemen Guru Sistem Absensi
</small>

</div>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#modalGuru">

<i class="fa fa-plus"></i>
Tambah Guru

</button>

</div>

<div class="card card-custom">

<div class="card-body">

<div class="row mb-3">

<div class="col-md-4">

<input
type="text"
id="search"
class="form-control"
placeholder="Cari Guru...">

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>ID Guru</th>
<th>Nama Guru</th>
<th>NIP</th>
<th>Jabatan</th>
<th>Username</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="tblGuru">

<tr>
<td colspan="6" class="text-center">
Memuat Data...
</td>
</tr>

</tbody>

</table>

</div>

<nav>

<ul class="pagination justify-content-center" id="pagination">

</ul>

</nav>

</div>

</div>

</div>

<div class="modal fade" id="modalGuru">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Tambah Guru
</h5>

<button
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6 mb-3">

<label>Nama Guru</label>

<input
type="text"
id="nama"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>NIP</label>

<input
type="text"
id="nip"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Jabatan</label>

<input
type="text"
id="jabatan"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Username</label>

<input
type="text"
id="username"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control">

</div>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Batal

</button>

<button
class="btn btn-success"
onclick="simpanGuru()">

Simpan

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let dataGuru = [];
let currentPage = 1;
let rowsPerPage = 10;

loadGuru();

function loadGuru(){

google.script.run

.withSuccessHandler(function(data){

dataGuru = data;

renderTable();

})

.getGuru();

}

function renderTable(){

let keyword =
document
.getElementById("search")
.value
.toLowerCase();

let filtered =
dataGuru.slice(1).filter(row =>

row.join(" ")
.toLowerCase()
.includes(keyword)

);

let start =
(currentPage-1)*rowsPerPage;

let end =
start+rowsPerPage;

let rows =
filtered.slice(start,end);

let html='';

rows.forEach(row=>{

html += `
<tr>

<td>${row[0]}</td>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>

<td>

<button
class="btn btn-danger btn-sm"
onclick="hapusGuru('${row[0]}')">

<i class="fa fa-trash"></i>

</button>

</td>

</tr>
`;

});

if(rows.length===0){

html=`
<tr>
<td colspan="6" class="text-center">
Tidak Ada Data
</td>
</tr>
`;

}

document
.getElementById("tblGuru")
.innerHTML=html;

renderPagination(filtered.length);

}

function renderPagination(total){

let pages =
Math.ceil(total/rowsPerPage);

let html='';

for(let i=1;i<=pages;i++){

html += `
<li class="page-item ${i===currentPage?'active':''}">

<a
href="#"
class="page-link"
onclick="gotoPage(${i})">

${i}

</a>

</li>
`;

}

document
.getElementById("pagination")
.innerHTML=html;

}

function gotoPage(page){

currentPage=page;

renderTable();

}

document
.getElementById("search")
.addEventListener("keyup",function(){

currentPage=1;

renderTable();

});

function simpanGuru(){

let obj={

nama:
document.getElementById("nama").value,

nip:
document.getElementById("nip").value,

jabatan:
document.getElementById("jabatan").value,

username:
document.getElementById("username").value,

password:
document.getElementById("password").value

};

google.script.run

.withSuccessHandler(function(){

alert(
'Data Guru Berhasil Disimpan'
);

bootstrap
.Modal
.getInstance(
document.getElementById('modalGuru')
)
.hide();

loadGuru();

})

.simpanGuru(obj);

}

function hapusGuru(id){

if(
!confirm(
'Hapus Data Guru ?'
)
){
return;
}

google.script.run

.withSuccessHandler(function(){

loadGuru();

})

.hapusGuru(id);

}

</script>

</body>
</html>
