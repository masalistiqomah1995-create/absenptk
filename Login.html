<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Absensi Guru Digital</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:
      linear-gradient(
      135deg,
      #2563EB,
      #1E40AF);

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:'Segoe UI',sans-serif;
    }

    .login-card{

      width:100%;
      max-width:420px;

      background:rgba(255,255,255,.15);

      backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,.2);

      border-radius:25px;

      padding:40px;

      box-shadow:
      0 10px 40px rgba(0,0,0,.25);

      animation:fadeIn .7s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      width:100px;
      height:100px;
      object-fit:contain;
      margin-bottom:20px;
    }

    .title{
      color:#fff;
      font-weight:700;
      font-size:28px;
    }

    .subtitle{
      color:#E5E7EB;
      font-size:14px;
      margin-bottom:25px;
    }

    .form-control{
      border-radius:12px;
      height:50px;
      border:none;
    }

    .input-group-text{
      border:none;
      border-radius:12px 0 0 12px;
      background:#fff;
    }

    .btn-login{
      height:50px;
      border:none;
      border-radius:12px;
      background:#22C55E;
      color:white;
      font-weight:600;
      transition:.3s;
    }

    .btn-login:hover{
      transform:translateY(-2px);
      background:#16A34A;
    }

    .footer{
      text-align:center;
      color:white;
      margin-top:20px;
      font-size:12px;
    }

    #loading{
      display:none;
    }

  </style>
</head>

<body>

<div class="login-card">

  <div class="text-center">

    <img
    class="logo"
    src="https://masalistiqomah.sch.id/wp-content/uploads/2026/05/logo-e1492233052256.png">

    <h3 class="title">
      Absensi Guru
    </h3>

    <div class="subtitle">
      Digital Attendance System
    </div>

  </div>

  <form id="formLogin">

    <div class="mb-3">

      <label class="text-white mb-2">
        Username
      </label>

      <div class="input-group">

        <span class="input-group-text">
          <i class="fa fa-user"></i>
        </span>

        <input
        type="text"
        id="username"
        class="form-control"
        placeholder="Masukkan Username"
        required>

      </div>

    </div>

    <div class="mb-4">

      <label class="text-white mb-2">
        Password
      </label>

      <div class="input-group">

        <span class="input-group-text">
          <i class="fa fa-lock"></i>
        </span>

        <input
        type="password"
        id="password"
        class="form-control"
        placeholder="Masukkan Password"
        required>

      </div>

    </div>

    <button
    type="submit"
    class="btn btn-login w-100">

      <span id="btnText">
        Login
      </span>

      <span id="loading">

        <span
        class="spinner-border spinner-border-sm">
        </span>

        Loading...

      </span>

    </button>

  </form>

  <div class="footer">

    © 2026 Absensi Guru Digital

  </div>

</div>

<script>

document
.getElementById("formLogin")
.addEventListener(
"submit",
function(e){

  e.preventDefault();

  let username =
  document
  .getElementById("username")
  .value;

  let password =
  document
  .getElementById("password")
  .value;

  document
  .getElementById("btnText")
  .style.display="none";

  document
  .getElementById("loading")
  .style.display="inline";

  google.script.run

  .withSuccessHandler(
  function(res){

      document
      .getElementById("btnText")
      .style.display="inline";

      document
      .getElementById("loading")
      .style.display="none";

      if(res.success){

sessionStorage.setItem(
"user",
JSON.stringify(res)
);

showToast(
"Login Berhasil"
);

setTimeout(function(){

location.reload();

},500);

}

  })

  .withFailureHandler(
  function(err){

      document
      .getElementById("btnText")
      .style.display="inline";

      document
      .getElementById("loading")
      .style.display="none";

      alert(
      err.message
      );

  })

  .login(
  username,
  password
  );

});

</script>

</body>
</html>
