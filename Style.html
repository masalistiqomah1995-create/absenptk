<style>

:root{

    --primary:#2563EB;
    --primary-dark:#1D4ED8;

    --success:#22C55E;
    --danger:#EF4444;
    --warning:#F59E0B;

    --bg:#F8FAFC;
    --card:#FFFFFF;

    --text:#0F172A;
    --text-secondary:#64748B;

    --sidebar:#0F172A;

    --shadow:
    0 10px 25px rgba(0,0,0,.08);

    --radius:20px;

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    background:var(--bg);

    color:var(--text);

    font-family:
    "Segoe UI",
    Tahoma,
    sans-serif;

    overflow-x:hidden;

}

/* ===========================
   LOADING
=========================== */

.loading-overlay{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:
    rgba(255,255,255,.9);

    z-index:99999;

    display:flex;

    justify-content:center;
    align-items:center;

}

.loading-spinner{

    width:60px;
    height:60px;

    border:5px solid #E2E8F0;

    border-top:
    5px solid
    var(--primary);

    border-radius:50%;

    animation:
    spin 1s linear infinite;

}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}

/* ===========================
   CONTENT
=========================== */

.main-content{

    padding:25px;

    min-height:100vh;

}

.page-title{

    font-size:28px;

    font-weight:700;

    margin-bottom:5px;

}

.page-subtitle{

    color:
    var(--text-secondary);

    margin-bottom:25px;

}

/* ===========================
   CARD
=========================== */

.card-modern{

    background:
    var(--card);

    border:none;

    border-radius:
    var(--radius);

    box-shadow:
    var(--shadow);

    transition:.3s;

}

.card-modern:hover{

    transform:
    translateY(-4px);

}

.card-glass{

    background:
    rgba(255,255,255,.2);

    backdrop-filter:
    blur(15px);

    border:
    1px solid rgba(255,255,255,.2);

    border-radius:
    var(--radius);

}

.card-stat{

    padding:20px;

}

.card-stat .title{

    font-size:14px;

    color:
    var(--text-secondary);

}

.card-stat .value{

    font-size:30px;

    font-weight:700;

}

/* ===========================
   ICON BOX
=========================== */

.icon-box{

    width:60px;
    height:60px;

    border-radius:16px;

    display:flex;

    justify-content:center;
    align-items:center;

    color:white;

    font-size:22px;

}

.icon-primary{
    background:var(--primary);
}

.icon-success{
    background:var(--success);
}

.icon-danger{
    background:var(--danger);
}

.icon-warning{
    background:var(--warning);
}

/* ===========================
   BUTTON
=========================== */

.btn-primary{

    background:
    var(--primary);

    border:none;

}

.btn-primary:hover{

    background:
    var(--primary-dark);

}

.btn-success{

    border:none;

}

.btn-danger{

    border:none;

}

.btn-modern{

    border-radius:12px;

    padding:
    10px 18px;

    font-weight:600;

}

/* ===========================
   FORM
=========================== */

.form-control,
.form-select{

    border-radius:12px;

    min-height:48px;

}

.form-control:focus,
.form-select:focus{

    box-shadow:none;

    border-color:
    var(--primary);

}

/* ===========================
   TABLE
=========================== */

.table{

    vertical-align:middle;

}

.table thead{

    background:
    var(--primary);

    color:white;

}

.table th{

    border:none;

}

.table td{

    vertical-align:middle;

}

/* ===========================
   BADGE
=========================== */

.badge-success{

    background:
    var(--success);

    color:white;

}

.badge-danger{

    background:
    var(--danger);

    color:white;

}

.badge-warning{

    background:
    var(--warning);

    color:white;

}

/* ===========================
   PAGINATION
=========================== */

.pagination .page-link{

    color:
    var(--primary);

    border-radius:10px;

    margin:0 3px;

}

.pagination .active .page-link{

    background:
    var(--primary);

    border-color:
    var(--primary);

}

/* ===========================
   CHART
=========================== */

.chart-container{

    position:relative;

    width:100%;

    min-height:350px;

}

/* ===========================
   ALERT
=========================== */

.alert-modern{

    border:none;

    border-radius:14px;

}

/* ===========================
   MODAL
=========================== */

.modal-content{

    border:none;

    border-radius:
    var(--radius);

}

/* ===========================
   ANIMATION
=========================== */

.fade-in{

    animation:
    fadeIn .4s ease;

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:
        translateY(15px);

    }

    to{

        opacity:1;

        transform:
        translateY(0);

    }

}

/* ===========================
   RESPONSIVE
=========================== */

@media(max-width:992px){

    .page-title{

        font-size:24px;

    }

}

@media(max-width:768px){

    .main-content{

        padding:15px;

    }

    .page-title{

        font-size:22px;

    }

    .card-stat .value{

        font-size:24px;

    }

}

@media(max-width:576px){

    .page-title{

        font-size:20px;

    }

}

</style>
