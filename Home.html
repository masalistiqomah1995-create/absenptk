<!DOCTYPE html>
<html>
<head>
<base target="_top">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#F8FAFC;
    font-family:'Segoe UI',sans-serif;
}

.content{
    padding:25px;
}

.page-title{
    font-size:28px;
    font-weight:700;
    color:#1E293B;
}

.page-subtitle{
    color:#64748B;
}

.card-stat{
    border:none;
    border-radius:20px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card-stat:hover{
    transform:translateY(-5px);
}

.icon-box{
    width:60px;
    height:60px;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:25px;
    color:white;
}

.bg-primary-custom{
    background:#2563EB;
}

.bg-success-custom{
    background:#22C55E;
}

.bg-danger-custom{
    background:#EF4444;
}

.bg-warning-custom{
    background:#F59E0B;
}

.number{
    font-size:28px;
    font-weight:700;
}

.chart-card{
    border:none;
    border-radius:20px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.table-card{
    border:none;
    border-radius:20px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.table thead{
    background:#2563EB;
    color:white;
}

.loading{
    display:flex;
    justify-content:center;
    align-items:center;
    height:250px;
}

</style>

</head>

<body>

<div class="content">

<div class="mb-4">

<div class="page-title">
Dashboard Absensi Guru
</div>

<div class="page-subtitle">
Monitoring Kehadiran Guru Secara Realtime
</div>

</div>

<div class="row g-4">

<div class="col-md-3">

<div class="card card-stat p-3">

<div class="d-flex justify-content-between align-items-center">

<div>

<div>Jumlah Guru</div>

<div id="jumlahGuru" class="number">
0
</div>

</div>

<div class="icon-box bg-primary-custom">
<i class="fa-solid fa-users"></i>
</div>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card card-stat p-3">

<div class="d-flex justify-content-between align-items-center">

<div>

<div>Hadir Hari Ini</div>

<div id="hadirHariIni" class="number">
0
</div>

</div>

<div class="icon-box bg-success-custom">
<i class="fa-solid fa-user-check"></i>
</div>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card card-stat p-3">

<div class="d-flex justify-content-between align-items-center">

<div>

<div>Terlambat</div>

<div id="terlambatHariIni" class="number">
0
</div>

</div>

<div class="icon-box bg-danger-custom">
<i class="fa-solid fa-clock"></i>
</div>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card card-stat p-3">

<div class="d-flex justify-content-between align-items-center">

<div>

<div>Belum Absen</div>

<div id="belumAbsen" class="number">
0
</div>

</div>

<div class="icon-box bg-warning-custom">
<i class="fa-solid fa-user-xmark"></i>
</div>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-lg-8">

<div class="card chart-card">

<div class="card-body">

<h5 class="mb-3">
Grafik Kehadiran Bulanan
</h5>

<canvas id="chartKehadiran"></canvas>

</div>

</div>

</div>

<div class="col-lg-4">

<div class="card chart-card">

<div class="card-body">

<h5 class="mb-3">
Persentase Kehadiran
</h5>

<canvas id="pieChart"></canvas>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-lg-12">

<div class="card table-card">

<div class="card-body">

<h5 class="mb-3">
Rekap Cepat Guru
</h5>

<div class="table-responsive">

<table class="table table-bordered">

<thead>

<tr>
<th>Guru</th>
<th>Hadir</th>
<th>Terlambat</th>
<th>Persentase</th>
</tr>

</thead>

<tbody id="rekapCepat">

<tr>
<td colspan="4" class="text-center">
Memuat Data...
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

let chartBar;
let chartPie;

loadDashboard();

function loadDashboard(){

google.script.run
.withSuccessHandler(function(data){

document.getElementById("jumlahGuru").innerHTML =
data.jumlahGuru;

document.getElementById("hadirHariIni").innerHTML =
data.hadir;

document.getElementById("terlambatHariIni").innerHTML =
data.terlambat;

document.getElementById("belumAbsen").innerHTML =
data.belumAbsen;

})
.getDashboardStatistik();

google.script.run
.withSuccessHandler(function(data){

renderChart(data);

})
.getChartData();

google.script.run
.withSuccessHandler(function(data){

renderRekap(data);

})
.getGuru();

}

function renderChart(data){

const ctx =
document.getElementById('chartKehadiran');

if(chartBar){
chartBar.destroy();
}

chartBar = new Chart(ctx,{

type:'bar',

data:{
labels:[
'Hadir',
'Terlambat',
'Tidak Hadir'
],

datasets:[{

label:'Jumlah',

data:[
data.hadir,
data.terlambat,
data.tidakHadir
],

backgroundColor:[
'#22C55E',
'#F59E0B',
'#EF4444'
]

}]
},

options:{
responsive:true
}

});

const pie =
document.getElementById('pieChart');

if(chartPie){
chartPie.destroy();
}

chartPie = new Chart(pie,{

type:'doughnut',

data:{

labels:[
'Hadir',
'Terlambat',
'Tidak Hadir'
],

datasets:[{

data:[
data.hadir,
data.terlambat,
data.tidakHadir
],

backgroundColor:[
'#22C55E',
'#F59E0B',
'#EF4444'
]

}]
}

});

}

function renderRekap(data){

let html='';

for(let i=1;i<data.length;i++){

html += `
<tr>

<td>${data[i][1]}</td>

<td>0</td>

<td>0</td>

<td>0%</td>

</tr>
`;

}

if(data.length<=1){

html=`
<tr>
<td colspan="4" class="text-center">
Belum Ada Data
</td>
</tr>
`;

}

document.getElementById(
"rekapCepat"
).innerHTML=html;

}

setInterval(function(){

loadDashboard();

},30000);

</script>

</body>
</html>
