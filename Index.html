<body>

<div id="loadingOverlay" class="loading-overlay">

<div class="loading-spinner"></div>

</div>

<div id="app">

</div>

<?!= include('Script'); ?>

<script>

showLogin();

function showLogin(){

google.script.run

.withSuccessHandler(function(html){

document
.getElementById("app")
.innerHTML = html;

hideLoading();

})

.getPage("Login");

}

function showDashboard(){

document
.getElementById("app")
.innerHTML = `

<?!= include("Sidebar"); ?>

<div
id="mainContent"
class="content-wrapper">

</div>

`;

loadPage("Home");

}

window.addEventListener(
"load",
function(){

let user =
sessionStorage.getItem(
"user"
);

if(user){

showDashboard();

}else{

showLogin();

}

});

</script>

</body>

</html>
