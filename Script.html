<script>

/* ===================================
   GLOBAL VARIABLE
=================================== */

let currentUser = null;
let currentPage = "Home";

/* ===================================
   INIT APP
=================================== */

document.addEventListener(
"DOMContentLoaded",
function(){

    initializeApp();

});

function initializeApp(){

    checkSession();

    hideLoading();

}

/* ===================================
   SESSION LOGIN
=================================== */

function checkSession(){

    try{

        let userData =
        sessionStorage.getItem("user");

        if(!userData){

            return;

        }

        currentUser =
        JSON.parse(userData);

    }
    catch(err){

        console.error(err);

    }

}

function saveSession(data){

    sessionStorage.setItem(
    "user",
    JSON.stringify(data)
    );

    currentUser = data;

}

function logout(){

    if(
    !confirm(
    "Yakin ingin logout ?"
    )
    ){
        return;
    }

    sessionStorage.clear();

    localStorage.clear();

    location.reload();

}

/* ===================================
   PAGE ROUTER
=================================== */

function loadPage(page){

    currentPage = page;

    showLoading();

    google.script.run

    .withSuccessHandler(function(html){

        let container =
        document.getElementById(
        "mainContent"
        );

        if(container){

            container.innerHTML = html;

        }

        hideLoading();

        setActiveMenu(page);

        window.scrollTo(
        0,
        0
        );

    })

    .withFailureHandler(function(error){

        hideLoading();

        showToast(
        error.message,
        "danger"
        );

    })

    .getPage(page);

}

function setActiveMenu(page){

    let menus =
    document.querySelectorAll(
    ".sidebar-menu a"
    );

    menus.forEach(menu=>{

        menu.classList.remove(
        "active"
        );

    });

    let target =
    document.getElementById(
    "menu"+page
    );

    if(target){

        target.classList.add(
        "active"
        );

    }

}

/* ===================================
   LOADING OVERLAY
=================================== */

function showLoading(){

    let loading =
    document.getElementById(
    "loadingOverlay"
    );

    if(loading){

        loading.style.display =
        "flex";

    }

}

function hideLoading(){

    let loading =
    document.getElementById(
    "loadingOverlay"
    );

    if(loading){

        loading.style.display =
        "none";

    }

}

/* ===================================
   TOAST NOTIFICATION
=================================== */

function showToast(
message,
type="success"
){

    let toastHTML = `

    <div
    class="toast align-items-center text-bg-${type}
    border-0 show position-fixed bottom-0 end-0 m-4"
    role="alert"
    style="z-index:99999;">

        <div class="d-flex">

            <div class="toast-body">

                ${message}

            </div>

            <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            onclick="this.parentElement.parentElement.remove()">
            </button>

        </div>

    </div>

    `;

    document.body.insertAdjacentHTML(
    "beforeend",
    toastHTML
    );

    setTimeout(function(){

        let toast =
        document.querySelector(
        ".toast"
        );

        if(toast){

            toast.remove();

        }

    },3000);

}

/* ===================================
   GOOGLE SCRIPT RUN WRAPPER
=================================== */

function runServer(
funcName,
params,
successCallback
){

    showLoading();

    let runner =
    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        if(successCallback){

            successCallback(
            result
            );

        }

    })

    .withFailureHandler(function(error){

        hideLoading();

        showToast(
        error.message,
        "danger"
        );

    });

    if(params){

        runner[funcName](params);

    }else{

        runner[funcName]();

    }

}

/* ===================================
   EXPORT PDF
=================================== */

function exportPDF(){

    google.script.run

    .withSuccessHandler(function(url){

        window.open(
        url,
        "_blank"
        );

        showToast(
        "PDF berhasil dibuat"
        );

    })

    .exportPDF();

}

/* ===================================
   EXPORT EXCEL
=================================== */

function exportExcel(){

    google.script.run

    .withSuccessHandler(function(url){

        window.open(
        url,
        "_blank"
        );

        showToast(
        "Excel berhasil dibuat"
        );

    })

    .exportExcel();

}

/* ===================================
   REFRESH DASHBOARD
=================================== */

function autoRefreshDashboard(){

    setInterval(function(){

        if(
        currentPage === "Home"
        ){

            if(
            typeof loadDashboard
            === "function"
            ){

                loadDashboard();

            }

        }

    },30000);

}

/* ===================================
   FORMAT DATE
=================================== */

function formatDate(date){

    let d =
    new Date(date);

    return d.toLocaleDateString(
    "id-ID"
    );

}

/* ===================================
   FORMAT NUMBER
=================================== */

function formatNumber(number){

    return Number(number)
    .toLocaleString(
    "id-ID"
    );

}

/* ===================================
   SEARCH TABLE
=================================== */

function searchTable(
inputId,
tableId
){

    let keyword =
    document
    .getElementById(inputId)
    .value
    .toLowerCase();

    let rows =
    document
    .querySelectorAll(
    "#" +
    tableId +
    " tr"
    );

    rows.forEach(function(row){

        let text =
        row.innerText
        .toLowerCase();

        row.style.display =
        text.includes(keyword)
        ? ""
        : "none";

    });

}

/* ===================================
   PAGINATION HELPER
=================================== */

function paginate(
data,
page,
limit
){

    let start =
    (page-1)*limit;

    let end =
    start+limit;

    return data.slice(
    start,
    end
    );

}

/* ===================================
   CHART DESTROY
=================================== */

function destroyChart(chart){

    if(chart){

        chart.destroy();

    }

}

/* ===================================
   MODAL HELPER
=================================== */

function openModal(id){

    let modal =
    new bootstrap.Modal(
    document.getElementById(id)
    );

    modal.show();

}

function closeModal(id){

    bootstrap.Modal
    .getInstance(
    document.getElementById(id)
    )
    .hide();

}

/* ===================================
   RESET FORM
=================================== */

function resetForm(formId){

    document
    .getElementById(formId)
    .reset();

}

/* ===================================
   REALTIME CLOCK
=================================== */

function startClock(){

    setInterval(function(){

        let el =
        document.getElementById(
        "clock"
        );

        if(!el) return;

        let now =
        new Date();

        el.innerHTML =
        now.toLocaleTimeString(
        "id-ID"
        );

    },1000);

}

/* ===================================
   NETWORK STATUS
=================================== */

window.addEventListener(
"offline",
function(){

    showToast(
    "Koneksi Internet Terputus",
    "danger"
    );

});

window.addEventListener(
"online",
function(){

    showToast(
    "Koneksi Internet Kembali",
    "success"
    );

});

/* ===================================
   START SERVICES
=================================== */

autoRefreshDashboard();
startClock();

</script>
