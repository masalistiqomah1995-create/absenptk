<!DOCTYPE html>
<html>
<head>
<base target="_top">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#F8FAFC;
    font-family:'Segoe UI',sans-serif;
}

.card-modern{
    border:none;
    border-radius:20px;
    background:#FFFFFF;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.header-title{
    font-size:28px;
    font-weight:700;
    color:#1E293B;
}

.stat-box{
    border-radius:18px;
    padding:20px;
    color:white;
}

.bg-hadir{
    background:#22C55E;
}

.bg-terlambat{
    background:#F59E0B;
}

.bg-persen{
    background:#2563EB;
}

.table thead{
    background:#2563EB;
    color:white;
}

</style>

</head>

<body>

<div class="container-fluid p-4">

<div class="mb-4">

<div class="header-title">
Rekap Absensi Guru
</div>

<div class="text-muted">
Laporan Kehadiran Bulanan Guru
</div>

</div>

<div class="card card-modern mb-4">

<div class="card-body">

<div class="row">

<div class="col-md-4 mb-3">

<label>Guru</label>

<select
id="filterGuru"
class="form-select">

<option value="">
Semua Guru
</option>

</select>

</div>

<div class="col-md-3 mb-3">

<label>Bulan</label>

<input
type="month"
id="filterBulan"
class="form-control">

</div>

<div class="col-md-5 d-flex align-items-end gap-2">

<button
class="btn btn-primary"
onclick="loadRekap()">

<i class="fa fa-search"></i>
 Tampilkan

</button>

<button
class="btn btn-danger"
onclick="exportPDF()">

<i class="fa fa-file-pdf"></i>
 PDF

</button>

<button
class="btn btn-success"
onclick="exportExcel()">

<i class="fa fa-file-excel"></i>
 Excel

</button>

</div>

</div>

</div>

</div>

<div class="row mb-4">

<div class="col-md-4">

<div class="stat-box bg-hadir">

<h5>Total Hadir</h5>

<h2 id="totalHadir">
0
</h2>

</div>

</div>

<div class="col-md-4">

<div class="stat-box bg-terlambat">

<h5>Total Terlambat</h5>

<h2 id="totalTerlambat">
0
</h2>

</div>

</div>

<div class="col-md-4">

<div class="stat-box bg-persen">

<h5>Persentase</h5>

<h2 id="persentase">
0%
</h2>

</div>

</div>

</div>

<div class="row">

<div class="col-lg-8">

<div class="card card-modern">

<div class="card-body">

<h5 class="mb-3">
Detail Rekap
</h5>

<div class="table-responsive">

<table class="table table-bordered">

<thead>

<tr>

<th>Tanggal</th>
<th>Guru</th>
<th>Jam Masuk</th>
<th>Status</th>
<th>Jam Pulang</th>

</tr>

</thead>

<tbody id="tbodyRekap">

<tr>

<td colspan="5" class="text-center">

Silakan pilih filter

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<div class="col-lg-4">

<div class="card card-modern">

<div class="card-body">

<h5 class="mb-3">
Grafik Kehadiran
</h5>

<canvas id="chartRekap"></canvas>

</div>

</div>

</div>

</div>

</div>

<script>

let chart;

loadGuru();

function loadGuru(){

google.script.run

.withSuccessHandler(function(data){

let html =
'<option value="">Semua Guru</option>';

for(let i=1;i<data.length;i++){

html += `
<option value="${data[i][1]}">
${data[i][1]}
</option>
`;

}

document
.getElementById("filterGuru")
.innerHTML = html;

})

.getGuru();

}

function loadRekap(){

google.script.run

.withSuccessHandler(function(data){

renderRekap(data);

})

.getAbsensi();

}

function renderRekap(data){

let guru =
document
.getElementById("filterGuru")
.value;

let bulan =
document
.getElementById("filterBulan")
.value;

let html='';

let hadir=0;
let terlambat=0;

data.slice(1).forEach(function(r){

if(guru && r[2]!==guru){
return;
}

hadir++;

if(r[4]==='Terlambat'){
terlambat++;
}

html += `
<tr>

<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
<td>${r[5]}</td>

</tr>
`;

});

if(html===''){

html=`
<tr>
<td colspan="5" class="text-center">
Tidak Ada Data
</td>
</tr>
`;

}

document
.getElementById("tbodyRekap")
.innerHTML = html;

let persen = 0;

if(hadir>0){

persen =
Math.round(
((hadir-terlambat)/hadir)*100
);

}

document
.getElementById("totalHadir")
.innerHTML = hadir;

document
.getElementById("totalTerlambat")
.innerHTML = terlambat;

document
.getElementById("persentase")
.innerHTML =
persen + "%";

renderChart(
hadir,
terlambat,
Math.max(0,hadir-terlambat)
);

}

function renderChart(hadir,terlambat,tepat){

let ctx =
document.getElementById('chartRekap');

if(chart){
chart.destroy();
}

chart = new Chart(ctx,{

type:'doughnut',

data:{

labels:[
'Tepat Waktu',
'Terlambat'
],

datasets:[{

data:[
tepat,
terlambat
],

backgroundColor:[
'#22C55E',
'#F59E0B'
]

}]

}

});

}

function exportPDF(){

google.script.run

.withSuccessHandler(function(url){

window.open(url);

})

.exportPDF();

}

function exportExcel(){

google.script.run

.withSuccessHandler(function(url){

window.open(url);

})

.exportExcel();

}

</script>

</body>
</html>
